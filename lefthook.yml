pre-commit:
  jobs:
    - name: oxfmt
      glob: '*.{js,jsx,ts,tsx,vue,cjs,mjs,cts,mts,json,jsonc}'
      run: pnpm exec oxfmt --threads=4 --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
    - name: eslint
      glob: '*.{js,jsx,ts,tsx,vue,cjs,mjs,cts,mts}'
      run: pnpm exec eslint --fix {staged_files}
      stage_fixed: true
